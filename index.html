<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Timer</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
  }

  /* CENTER EVERYTHING */
  #wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #time-counter {
    width: 60%;
    padding: 25px;
    text-align: center;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    animation: fadeIn 1.5s ease;
  }

  #time-counter h2 {
    color: #ff6b9a;
    margin-bottom: 15px;
  }

  #timer {
    font-size: 40px;
    color: #555;
    line-height: 1.6;
    transition: transform 0.2s ease;
  }

  #timer:hover {
    transform: scale(1.05);
  }

  /* MINI COUNTER STYLE */
  #mini-timer {
    font-size: 18px;
    color: #888;
    margin-top: 15px;
    padding: 8px 12px;
    display: inline-block;
    background: #f9f9f9;
    border-radius: 12px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div id="wrapper">
  <div id="time-counter">
    <p id="timer">Loading...</p>
    <p id="mini-timer">Loading mini counter...</p>
  </div>
</div>

<script>
  function updateTimer() {
    const startDate = new Date(2026, 2, 28, 12, 0, 0); // March 28, 2026

    const now = new Date();
    const diff = now - startDate;

    if (diff < 0) {
      document.getElementById("timer").innerText = "Waiting for the moment 💫";
      return;
    }

    const seconds = Math.floor(diff / 1000) % 60;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("timer").innerText =
      `${days}D . ${hours}H ♡ ${minutes}M . ${seconds}S`;
  }

  function updateMiniTimer() {
    const miniStartDate = new Date(2026, 0, 24, 0, 0, 0); // Jan 24, 2026

    const now = new Date();
    const diff = now - miniStartDate;

    if (diff < 0) {
      document.getElementById("mini-timer").innerText = "Mini counter not started yet ✨";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("mini-timer").innerText =
      `${days}`;
  }

  setInterval(updateTimer, 1000);
  setInterval(updateMiniTimer, 1000);

  updateTimer();
  updateMiniTimer();
</script>

</body>
</html>
